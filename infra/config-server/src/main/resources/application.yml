server:
  port: ${PORT:0}


spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:config/core/{application}
            - classpath:config/infra/{application}
            - classpath:config/stats/{application}

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    instance-id: "${spring.application.name}:${random.value}"  # уникальный ID экземпляра
    hostname: localhost


logging:
  level:
    org.springframework.cloud.config.server: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot.web: TRACE
