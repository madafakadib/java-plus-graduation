server:
  port: 0

spring:
  application:
    name: main-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ewm
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

#logging:
#  level:
#    ru.practicum.ewm: DEBUG
#    org.hibernate.SQL: DEBUG

eureka:
  instance:
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/