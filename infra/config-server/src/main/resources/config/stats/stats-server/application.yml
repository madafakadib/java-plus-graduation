server:
  port: ${PORT:0}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/stats
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      continue-on-error: false


logging:
  level:
    ru.practicum.stats: DEBUG
    org.hibernate.SQL: DEBUG
