server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: main-service-route
          uri: lb://MAIN-SERVICE
          predicates:
            - Path=/admin/**, /users/**, /categories/**, /events/**, /compilations/** # Все эндпоинты диплома EWM

        - id: stats-service-route
          uri: lb://STATS-SERVER
          predicates:
            - Path=/hit, /stats
