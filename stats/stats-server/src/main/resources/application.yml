server:
  port: 0

spring:
  application:
    name: ewm-stats-server

  config:
    import: optional:configserver:http://config-server
    fail-fast: true
    retry:
      useRandomPolicy: true
      max-interval: 6000

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/